<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>JARVIS — Agency Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070b12; --panel:#0f1621; --panel2:#0b111a; --line:#1c2636; --line2:#26334a;
  --txt:#e8eef6; --muted:#7c8aa0; --dim:#556074;
  --accent:#38bdf8; --ok:#34d399; --warn:#fbbf24; --err:#f87171;
}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;
  background-image:radial-gradient(1200px 600px at 15% -10%,rgba(56,189,248,.08),transparent 55%),
                   radial-gradient(1000px 500px at 100% 110%,rgba(52,211,153,.06),transparent 55%);}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:20px;padding:0 20px;height:60px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(15,22,33,.9),rgba(7,11,18,.6));backdrop-filter:blur(6px);flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px;min-width:210px}
.orb{width:32px;height:32px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 34% 30%,#a5e8ff,#0ea5e9 55%,#0c4a6e);
  box-shadow:0 0 22px rgba(56,189,248,.6);animation:pulse 3.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 16px rgba(56,189,248,.45)}50%{box-shadow:0 0 30px rgba(56,189,248,.8)}}
.brand b{font-size:1.2rem;letter-spacing:.06em;font-weight:800}
.brand small{display:block;color:var(--muted);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;margin-top:-2px}
.tabs{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px}
.tab{border:none;background:transparent;color:var(--muted);font-family:inherit;font-weight:600;font-size:.88rem;
  padding:8px 18px;border-radius:9px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--txt)}
.tab.active{background:linear-gradient(180deg,#1b2740,#141d2e);color:#fff;box-shadow:inset 0 0 0 1px var(--line2)}
.tab .cnt{background:var(--line2);color:var(--txt);font-size:.68rem;border-radius:999px;padding:1px 7px;font-weight:700}
.spacer{flex:1}
.badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-size:.74rem;font-weight:700}
.badge.on{background:rgba(52,211,153,.14);color:var(--ok)}
.badge.off{background:rgba(251,191,36,.14);color:var(--warn)}
.badge .pip{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.clock{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:.8rem}
.view{flex:1;min-height:0;display:none}
.view.active{display:flex}
#view-command{display:none}
#view-command.active{display:grid;grid-template-columns:230px 1fr 1.15fr;height:100%}
.col{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line)}
.col:last-child{border-right:none}
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.hd h2{font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:700}
.hd .tools{display:flex;gap:6px}
.iconbtn{width:28px;height:28px;border:1px solid var(--line);background:var(--panel2);border-radius:8px;color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:.15s}
.iconbtn:hover{color:var(--txt);border-color:var(--line2)}
.rail{padding:10px;overflow-y:auto;flex:1}
.arow{display:flex;gap:11px;padding:11px 10px;border-radius:11px;transition:background .15s;cursor:pointer;align-items:flex-start}
.arow:hover{background:var(--panel)}
.arow .av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;font-weight:700}
.arow .nm{font-weight:700;font-size:.9rem;line-height:1.1}
.arow .rl{color:var(--muted);font-size:.72rem;margin-top:2px}
.arow .stat{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);margin-top:6px}
.chathead{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line)}
.chathead .av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
.chathead .nm{font-weight:700}
.chathead .rl{color:var(--muted);font-size:.74rem}
.stream{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth}
.msg{max-width:86%;padding:11px 14px;border-radius:14px;font-size:.92rem;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.new{animation:pop .28s ease}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.msg .who{font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px;font-weight:800}
.msg.you{align-self:flex-end;background:linear-gradient(180deg,#38bdf8,#0ea5e9);color:#042031}
.msg.you .who{color:#042031;opacity:.65}
.msg.ag{align-self:flex-start;background:var(--panel);border:1px solid var(--line)}
.composer{padding:14px;border-top:1px solid var(--line);display:flex;gap:10px;flex-shrink:0}
.composer input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:12px;
  padding:13px 15px;font-size:.94rem;font-family:inherit;outline:none;transition:.15s}
.composer input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
.composer button{background:linear-gradient(180deg,#38bdf8,#0ea5e9);color:#042031;border:none;border-radius:12px;
  padding:0 22px;font-weight:800;cursor:pointer;font-size:.92rem;transition:.15s}
.composer button:hover{filter:brightness(1.08)}
.rightcol{display:flex;flex-direction:column;min-height:0}
.board{display:flex;flex-direction:column;min-height:0;flex:1}
.tasks{overflow-y:auto;padding:12px;flex:1}
.task{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px}
.task.new{animation:pop .28s ease}
.task .row{display:flex;align-items:center;gap:9px}
.task .av{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.task .ag{font-weight:700;font-size:.84rem}
.task .ins{color:var(--muted);font-size:.8rem;margin-top:6px;line-height:1.45}
.task .res{color:var(--ok);font-size:.79rem;margin-top:7px;white-space:pre-wrap;line-height:1.45}
.stat-pill{margin-left:auto;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;padding:4px 9px;border-radius:999px;white-space:nowrap}
.s-recebida{background:rgba(124,138,160,.16);color:var(--muted)}
.s-em_andamento{background:rgba(56,189,248,.16);color:var(--accent)}
.s-concluida{background:rgba(52,211,153,.16);color:var(--ok)}
.s-aguardando_aprovacao{background:rgba(251,191,36,.16);color:var(--warn)}
.s-erro{background:rgba(248,113,113,.18);color:var(--err)}
.spin{width:10px;height:10px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:-1px;margin-right:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.approve{margin-top:9px;background:linear-gradient(180deg,#fbbf24,#f59e0b);color:#241a00;border:none;border-radius:8px;
  padding:7px 15px;font-weight:800;cursor:pointer;font-size:.76rem}
.preview{border-top:1px solid var(--line);display:flex;flex-direction:column;flex:0 0 44%;min-height:0;transition:flex-basis .25s ease}
.preview.min{flex-basis:49px}
.preview .slug{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent)}
.frame{flex:1;background:#0a0a0a;position:relative;overflow:hidden;min-height:0}
.frame iframe{position:absolute;top:0;left:0;width:166.7%;height:166.7%;transform:scale(.6);transform-origin:top left;border:none;background:#fff}
.preview.min .frame,.preview.min .editbar{display:none}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:.85rem;text-align:center;padding:24px}
.editbar{display:flex;gap:8px;padding:9px 11px;border-top:1px solid var(--line);flex-shrink:0}
.editbar input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 11px;font-size:.83rem;outline:none;font-family:inherit}
.editbar button{background:linear-gradient(180deg,#34d399,#10b981);color:#04140c;border:none;border-radius:9px;padding:0 14px;font-weight:800;cursor:pointer;font-size:.83rem}
.pwrap{flex:1;overflow-y:auto;padding:26px 32px;width:100%}
.vhead{display:flex;align-items:baseline;gap:14px;margin-bottom:22px}
.vhead h1{font-size:1.5rem;font-weight:800;letter-spacing:-.01em}
.vhead p{color:var(--muted);font-size:.9rem}
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.pcard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;
  padding:20px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.pcard:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
.pcard .glow{position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--accent),transparent)}
.pcard h3{font-size:1.12rem;font-weight:700;margin-bottom:6px}
.pcard .meta{color:var(--muted);font-size:.78rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pcard .st{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:999px}
.pcard .cta{margin-top:16px;color:var(--accent);font-size:.82rem;font-weight:700}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .n{font-size:1.7rem;font-weight:800;letter-spacing:-.02em}
.kpi .l{color:var(--muted);font-size:.76rem;margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.acard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:12px}
.acard .top{display:flex;align-items:center;gap:14px}
.acard .av{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700}
.acard h3{font-size:1.15rem;font-weight:800}
.acard .rl{color:var(--muted);font-size:.8rem}
.acard .bl{color:var(--txt);font-size:.88rem;line-height:1.5;opacity:.85}
.acard .foot{display:flex;align-items:center;gap:8px;color:var(--ok);font-size:.76rem;font-weight:700;margin-top:auto}
.modal{position:fixed;inset:0;z-index:100;background:rgba(4,7,12,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:34px}
.modal.open{display:flex}
.modal .box{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:1180px;height:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal .mh{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .mh h3{font-weight:800;font-size:1.05rem}
.modal .mh .slug{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--accent)}
.modal .mh .x{margin-left:auto}
.modal .mbody{flex:1;min-height:0;display:flex}
.modal .mframe{flex:1;background:#0a0a0a;position:relative;overflow:hidden}
.modal .mframe iframe{width:100%;height:100%;border:none;background:#fff}
.modal .mside{width:340px;border-left:1px solid var(--line);overflow-y:auto;padding:18px;flex-shrink:0}
.modal .mside h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin:4px 0 12px}
.tl{position:relative;padding-left:20px}
.tl .ti{position:relative;padding-bottom:15px}
.tl .ti::before{content:"";position:absolute;left:-14px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.tl .ti::after{content:"";position:absolute;left:-10px;top:13px;bottom:0;width:1px;background:var(--line2)}
.tl .ti:last-child::after{display:none}
.tl .ag{font-weight:700;font-size:.84rem}
.tl .rs{color:var(--muted);font-size:.78rem;margin-top:3px;line-height:1.45}
.btn-lg{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg,#38bdf8,#0ea5e9);color:#042031;border:none;border-radius:10px;padding:11px 18px;font-weight:800;cursor:pointer;font-size:.86rem;text-decoration:none;margin-top:8px}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
</style></head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="orb"></div><div><b>JARVIS</b><small>Agency Control</small></div></div>
    <div class="tabs">
      <button class="tab active" data-tab="command" onclick="setTab('command')">◆ Command</button>
      <button class="tab" data-tab="projects" onclick="setTab('projects')">▣ Projects <span class="cnt" id="tab-proj-cnt">0</span></button>
      <button class="tab" data-tab="agents" onclick="setTab('agents')">✦ Agents <span class="cnt" id="tab-agent-cnt">6</span></button>
    </div>
    <div class="spacer"></div>
    <span class="clock" id="clock"></span>
    <span id="ai-badge"></span>
  </div>

  <div class="view active" id="view-command">
    <div class="col">
      <div class="hd"><h2>Team</h2></div>
      <div class="rail" id="rail"></div>
    </div>
    <div class="col">
      <div class="chathead" id="chathead"></div>
      <div class="stream" id="stream"></div>
      <div class="composer">
        <input id="say" placeholder="Talk to Nova… (e.g. 'build a site for…')" autocomplete="off">
        <button onclick="send()">Send</button>
      </div>
    </div>
    <div class="col rightcol">
      <div class="board" id="board">
        <div class="hd"><h2>Task board</h2><span class="clock" id="board-sub"></span></div>
        <div class="tasks" id="tasks"></div>
      </div>
      <div class="preview" id="preview">
        <div class="hd">
          <h2>Live preview <span class="slug" id="slug"></span></h2>
          <div class="tools">
            <button class="iconbtn" id="minbtn" title="Minimize" onclick="toggleMin()">▾</button>
            <button class="iconbtn" title="Expand" onclick="expandPreview()">⤢</button>
          </div>
        </div>
        <div class="frame" id="frame"><div class="empty" id="prev-empty">No site yet — ask Nova to build one and it appears here.</div></div>
        <div class="editbar">
          <input id="edit" placeholder="Tweak the current site (e.g. 'make it blue, add Sunday hours')">
          <button onclick="applyEdit()">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <div class="view" id="view-projects">
    <div class="pwrap">
      <div class="vhead"><h1>Projects</h1><p>Every site the team has built. Click one to open it.</p></div>
      <div class="stat-row" id="kpis"></div>
      <div class="grid" id="pgrid"></div>
    </div>
  </div>

  <div class="view" id="view-agents">
    <div class="pwrap">
      <div class="vhead"><h1>The Team</h1><p>Six agents. Nova runs the show; the rest do the work.</p></div>
      <div class="grid" id="agrid"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <div class="mh">
      <h3 id="m-title">Preview</h3><span class="slug" id="m-slug"></span>
      <button class="iconbtn x" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      <div class="mframe" id="m-frame"></div>
      <div class="mside" id="m-side" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const AG = {{ agents|tojson }};
const AI_ON = {{ 'true' if ai_enabled else 'false' }};
const STATUS = {recebida:'received', em_andamento:'working', concluida:'done',
                aguardando_aprovacao:'needs approval', erro:'error'};
const nm = k => (AG[k]&&AG[k].name) || (k==='you'?'You':k);
const col = k => (AG[k]&&AG[k].accent) || '#38bdf8';
const emo = k => (AG[k]&&AG[k].emoji) || '•';
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let currentTab='command', currentSlug=null, previewStamp=null, minimized=false;
let renderedMsgs=0, boardSig='', pgridSig='';

function setTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  if(t==='projects') renderProjects(true);
  if(t==='agents') renderAgents();
}

function renderRail(){
  document.getElementById('rail').innerHTML = Object.keys(AG).map(k=>`
    <div class="arow" onclick="setTab('agents')">
      <div class="av" style="background:${col(k)}22;color:${col(k)}">${emo(k)}</div>
      <div><div class="nm" style="color:${col(k)}">${nm(k)}</div><div class="rl">${AG[k].role}</div></div>
      <div class="stat"></div>
    </div>`).join('');
  document.getElementById('chathead').innerHTML =
    `<div class="av" style="background:${col('manager')}22;color:${col('manager')}">${emo('manager')}</div>
     <div><div class="nm" style="color:${col('manager')}">${nm('manager')}</div><div class="rl">${AG['manager'].role} · your right hand</div></div>`;
}
function renderAgents(){
  document.getElementById('agrid').innerHTML = Object.keys(AG).map(k=>`
    <div class="acard">
      <div class="top">
        <div class="av" style="background:${col(k)}22;color:${col(k)}">${emo(k)}</div>
        <div><h3 style="color:${col(k)}">${nm(k)}</h3><div class="rl">${AG[k].role}</div></div>
      </div>
      <div class="bl">${AG[k].blurb}</div>
      <div class="foot">● Online</div>
    </div>`).join('');
}

function renderChat(msgs){
  const stream=document.getElementById('stream');
  if(msgs.length < renderedMsgs){ stream.innerHTML=''; renderedMsgs=0; }
  const atBottom = stream.scrollHeight - stream.scrollTop - stream.clientHeight < 80;
  for(let i=renderedMsgs;i<msgs.length;i++){
    const m=msgs[i], mine=m.author==='you';
    const d=document.createElement('div');
    d.className=`msg ${mine?'you':'ag'} new`;
    d.innerHTML=`<div class="who" ${mine?'':`style="color:${col(m.author)}"`}>${mine?'You':nm(m.author)}</div>${esc(m.text)}`;
    stream.appendChild(d);
  }
  renderedMsgs=msgs.length;
  if(atBottom) stream.scrollTop=stream.scrollHeight;
}

function renderBoard(tasks){
  const sig=JSON.stringify(tasks.map(t=>[t.id,t.status,t.result]));
  if(sig===boardSig) return; boardSig=sig;
  const el=document.getElementById('tasks');
  const seen=new Set([...el.querySelectorAll('[data-tid]')].map(n=>n.dataset.tid));
  el.innerHTML = tasks.length ? tasks.map(t=>{
    const spin=t.status==='em_andamento'?'<span class="spin"></span>':'';
    const isNew=!seen.has(String(t.id));
    const appr=t.status==='aguardando_aprovacao'?`<button class="approve" onclick="approve(${t.id})">✓ Approve</button>`:'';
    return `<div class="task ${isNew?'new':''}" data-tid="${t.id}">
      <div class="row">
        <div class="av" style="background:${col(t.agent)}22;color:${col(t.agent)}">${emo(t.agent)}</div>
        <span class="ag" style="color:${col(t.agent)}">${nm(t.agent)}</span>
        <span class="stat-pill s-${t.status}">${spin}${STATUS[t.status]||t.status}</span>
      </div>
      <div class="ins">${esc(t.instruction)}</div>
      ${t.result?`<div class="res">✓ ${esc(t.result)}</div>`:''}${appr}</div>`;
  }).join('') : '<div class="empty">Delegated tasks show up here.</div>';
}

function pickReady(projects){ return projects.find(p=>p.status==='pronto'||p.status==='publicado'); }
function renderPreview(projects){
  const r=pickReady(projects);
  const stamp=r?r.slug+'|'+r.updated_at:null;
  if(stamp===previewStamp) return; previewStamp=stamp;
  const frame=document.getElementById('frame');
  if(!r){ currentSlug=null; document.getElementById('slug').textContent='';
    frame.innerHTML='<div class="empty">No site yet — ask Nova to build one and it appears here.</div>'; return; }
  currentSlug=r.slug; document.getElementById('slug').textContent='/s/'+r.slug;
  frame.innerHTML=`<iframe src="/s/${r.slug}?t=${encodeURIComponent(r.updated_at)}"></iframe>`;
}

function renderProjects(force){
  const p=(window._state&&window._state.projects)||[];
  document.getElementById('tab-proj-cnt').textContent=p.length;
  const t=(window._state&&window._state.tasks)||[];
  const done=t.filter(x=>x.status==='concluida').length;
  const sig=JSON.stringify(p.map(x=>[x.slug,x.status,x.updated_at]))+'|'+done;
  if(!force && sig===pgridSig) return; pgridSig=sig;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="n">${p.length}</div><div class="l">Projects</div></div>
    <div class="kpi"><div class="n">${p.filter(x=>x.status==='pronto'||x.status==='publicado').length}</div><div class="l">Sites ready</div></div>
    <div class="kpi"><div class="n">${done}</div><div class="l">Tasks completed</div></div>
    <div class="kpi"><div class="n" style="color:var(--ok)">6</div><div class="l">Agents online</div></div>`;
  const stc={pronto:['Ready','var(--ok)'],publicado:['Live','var(--accent)'],em_producao:['Building','var(--warn)']};
  document.getElementById('pgrid').innerHTML = p.length ? p.map(x=>{
    const s=stc[x.status]||[x.status,'var(--muted)'];
    return `<div class="pcard" onclick="openProject('${x.slug}')">
      <div class="glow"></div>
      <h3>${esc(x.name)}</h3>
      <div class="meta">
        <span class="st" style="background:${s[1]}22;color:${s[1]}">${s[0]}</span>
        <span>/s/${x.slug}</span><span>· ${(x.updated_at||'').slice(0,10)}</span>
      </div>
      <div class="cta">Open project →</div>
    </div>`;
  }).join('') : '<div class="empty" style="padding:50px">No projects yet. Ask Nova to build a site on the Command tab.</div>';
}

function expandPreview(){
  if(!currentSlug) return;
  document.getElementById('m-title').textContent='Live preview';
  document.getElementById('m-slug').textContent='/s/'+currentSlug;
  document.getElementById('m-side').style.display='none';
  document.getElementById('m-frame').innerHTML=`<iframe src="/s/${currentSlug}?t=${Date.now()}"></iframe>`;
  document.getElementById('modal').classList.add('open');
}
async function openProject(slug){
  document.getElementById('modal').classList.add('open');
  document.getElementById('m-title').textContent='Loading…';
  document.getElementById('m-side').style.display='block';
  document.getElementById('m-side').innerHTML='<h4>Loading…</h4>';
  document.getElementById('m-frame').innerHTML='';
  try{
    const d=await(await fetch('/api/project/'+slug)).json();
    if(d.error){ document.getElementById('m-side').innerHTML='<h4>Not found</h4>'; return; }
    document.getElementById('m-title').textContent=d.project.name;
    document.getElementById('m-slug').textContent='/s/'+slug;
    document.getElementById('m-frame').innerHTML = d.project.has_site
      ? `<iframe src="/s/${slug}?t=${Date.now()}"></iframe>`
      : '<div class="empty">Site still building…</div>';
    const tl=d.tasks.map(t=>`<div class="ti"><div class="ag" style="color:${col(t.agent)}">${emo(t.agent)} ${nm(t.agent)}
        <span class="stat-pill s-${t.status}" style="margin-left:6px">${STATUS[t.status]||t.status}</span></div>
        <div class="rs">${esc(t.result||t.instruction)}</div></div>`).join('');
    document.getElementById('m-side').innerHTML=`
      <h4>Status</h4>
      <div style="margin-bottom:18px;font-size:.9rem">${d.project.status.replace('_',' ')}</div>
      <a class="btn-lg" href="/s/${slug}" target="_blank">Open live site ↗</a>
      <h4 style="margin-top:22px">Build timeline</h4>
      <div class="tl">${tl||'<div class="rs">No tasks recorded.</div>'}</div>`;
  }catch(e){ document.getElementById('m-side').innerHTML='<h4>Error loading</h4>'; }
}
function closeModal(){ document.getElementById('modal').classList.remove('open');
  document.getElementById('m-frame').innerHTML=''; }
function toggleMin(){ minimized=!minimized;
  document.getElementById('preview').classList.toggle('min',minimized);
  document.getElementById('minbtn').textContent=minimized?'▴':'▾'; }

async function post(url,data){ const fd=new FormData(); for(const k in data) fd.append(k,data[k]);
  await fetch(url,{method:'POST',body:fd}); poll(); }
function send(){ const i=document.getElementById('say'),t=i.value.trim(); if(!t)return; i.value=''; post('/api/say',{text:t}); }
function applyEdit(){ if(!currentSlug)return; const i=document.getElementById('edit'),t=i.value.trim(); if(!t)return; i.value=''; post('/api/edit',{slug:currentSlug,instruction:t}); }
function approve(id){ post('/api/approve',{task_id:id}); }
document.getElementById('say').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
document.getElementById('edit').addEventListener('keydown',e=>{if(e.key==='Enter')applyEdit();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function poll(){
  try{
    const s=await(await fetch('/api/state')).json(); window._state=s;
    renderChat(s.messages); renderBoard(s.tasks); renderPreview(s.projects);
    document.getElementById('tab-proj-cnt').textContent=s.projects.length;
    document.getElementById('board-sub').textContent=s.tasks.filter(t=>t.status==='em_andamento').length?'● working':'';
    if(currentTab==='projects') renderProjects(false);
  }catch(e){}
}
function tick(){ const d=new Date(); document.getElementById('clock').textContent=
  d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
document.getElementById('ai-badge').innerHTML = AI_ON
  ? '<span class="badge on"><span class="pip"></span>Claude live</span>'
  : '<span class="badge off"><span class="pip"></span>demo mode</span>';
renderRail(); tick(); setInterval(tick,15000);
poll(); setInterval(poll,2000);
</script>
</body></html>
